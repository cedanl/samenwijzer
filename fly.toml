# Fly-config voor de app "digitale-gids" (publieksnaam: De digitale gids).
# URL: https://digitale-gids.fly.dev.
# Volledig los van ceda-regiobijeenkomst — eigen app, eigen machines.
# Staat op de repo-root omdat de data (oeren/, kwalificatiedossiers/) buiten het
# subproject leeft → build-context = root. Deploy vanuit de repo-root:
#   flyctl deploy -a digitale-gids --remote-only
app = "digitale-gids"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.fastapi"

# SQLite-sessiestore (FastAPI) vereist één machine: draai `flyctl scale count 1 -a digitale-gids`
# vóór/na de cutover-deploy en houd min_machines_running = 1. Zie de FastAPI-migratie-spec.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 60

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
