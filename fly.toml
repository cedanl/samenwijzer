# Fly-config voor de app "digitale-gids" (publieksnaam: De digitale gids).
# Hernoemd vanaf "samenwijzer-fase-1" (PR #151 renaming) → nieuwe URL
# https://digitale-gids.fly.dev. Fly kan apps niet hernoemen, dus dit is een
# nieuwe app; de oude "samenwijzer-fase-1" kan na de cutover worden verwijderd.
# Volledig los van ceda-regiobijeenkomst — eigen app, eigen machines.
# Staat op de repo-root omdat de data (oeren/, kwalificatiedossiers/) buiten het
# subproject leeft → build-context = root. Deploy vanuit de repo-root:
#   flyctl deploy -a digitale-gids --remote-only
app = "digitale-gids"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 60

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
