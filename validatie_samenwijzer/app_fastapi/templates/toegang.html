<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toegang · De digitale gids</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/app.css" />
</head>
<body class="loginpage">
  <form class="loginbox" method="post" action="/toegang">
    <div class="brand"><span class="glyph">§</span>De digitale gids</div>
    <h1 class="serif">Toegang</h1>
    <p class="sub">Deze omgeving is beschermd. Vul het toegangswachtwoord in om verder te gaan.</p>
    {% if fout %}<div class="loginfout">Onjuist wachtwoord. Probeer het opnieuw.</div>{% endif %}
    <input name="wachtwoord" type="password" placeholder="Toegangswachtwoord" autocomplete="current-password" required autofocus />
    <button type="submit" class="iconbtn wide">Verder</button>
  </form>
</body>
</html>
