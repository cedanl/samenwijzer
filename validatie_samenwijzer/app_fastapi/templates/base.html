<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}De digitale gids{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/app.css" />
</head>
<body class="app">

<nav class="appnav">
  <div class="wrap">
    <a class="brand" href="{{ '/mentor' if rol == 'mentor' else '/student' }}"><span class="glyph">§</span>De digitale gids</a>
    <div class="nav-right">
      {% if rol == 'student' %}
        <a class="mono {% if request.url.path == '/student' %}actief{% endif %}" href="/student">💬 Stel je vraag</a>
        <a class="mono {% if request.url.path == '/student/studiegids' %}actief{% endif %}" href="/student/studiegids">📄 Mijn studiegids</a>
        <a class="mono {% if request.url.path == '/student/voortgang' %}actief{% endif %}" href="/student/voortgang">📊 Mijn voortgang</a>
      {% elif rol == 'mentor' %}
        <a class="mono {% if request.url.path == '/mentor' %}actief{% endif %}" href="/mentor">👥 Mijn studenten</a>
      {% endif %}
      <a class="mono uit" href="/uitloggen">Uitloggen</a>
    </div>
  </div>
</nav>

<main class="appmain">
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</main>

<script src="/static/chat.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
